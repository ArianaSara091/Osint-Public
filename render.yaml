services:
  - type: web
    name: black-osint
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/osint-app run build && NODE_ENV=production pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: black-osint-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: OWNER_DISCORD_ID
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false

databases:
  - name: black-osint-db
    databaseName: black_osint
    user: black_osint
    plan: free
